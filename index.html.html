<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiniestroAI — Plataforma Inteligente de Siniestros</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy: #1C0A00;
  --navy2: #2A1000;
  --blue: #F47920;
  --blue2: #E86A10;
  --blue-lt: #FFF1E6;
  --blue-mid: #F9A05A;
  --teal: #C85A00;
  --teal-lt: #FFF1E6;
  --amber: #1C0A00;
  --amber-lt: #F5EDE5;
  --red: #B03000;
  --red-lt: #FFE8DC;
  --gray-50: #FAF6F2;
  --gray-100: #F0E8DF;
  --gray-200: #DDD0C4;
  --gray-400: #9C8878;
  --gray-600: #5C4030;
  --gray-800: #1C0A00;
  --white: #FFFFFF;
  --font-display: 'Nunito Sans', sans-serif;
  --font-body: 'Nunito Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 2px 12px rgba(11,31,58,0.08);
  --shadow-md: 0 4px 24px rgba(11,31,58,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: var(--font-body); background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

/* ─── LOGIN ─── */
#login-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, #1C0A00 60%, #2A1200 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#login-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244,121,32,0.25) 0%, transparent 70%);
  top: -200px; right: -150px;
}
#login-screen::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244,121,32,0.12) 0%, transparent 70%);
  bottom: -100px; left: -100px;
}
.login-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 48px 44px;
  width: 480px;
  position: relative;
  z-index: 1;
  backdrop-filter: blur(10px);
}
.login-logo {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--white);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.login-logo span { color: #5BA3E0; }
.login-tagline { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 40px; }
.login-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
.role-btn {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 18px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  color: var(--white);
}
.role-btn:hover { background: rgba(244,121,32,0.12); border-color: rgba(244,121,32,0.5); }
.role-btn.selected { background: rgba(244,121,32,0.25); border-color: #F47920; }
.role-icon { font-size: 22px; margin-bottom: 8px; }
.role-name { font-size: 14px; font-weight: 600; display: block; margin-bottom: 2px; }
.role-desc { font-size: 11px; color: rgba(255,255,255,0.4); display: block; }
.login-name-row { margin-bottom: 20px; }
.login-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius);
  padding: 11px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--white);
  outline: none;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: #F47920; }
.login-input::placeholder { color: rgba(255,255,255,0.25); }
.login-btn {
  width: 100%;
  background: #F47920;
  border: none;
  border-radius: var(--radius);
  padding: 13px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.login-btn:hover { background: #E86A10; }
.login-btn:active { transform: scale(0.99); }
.login-separator { text-align: center; font-size: 11px; color: rgba(255,255,255,0.25); margin: 16px 0; }
.demo-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.demo-chip {
  font-size: 11px; padding: 5px 12px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px; cursor: pointer;
  color: rgba(255,255,255,0.5);
  background: transparent;
  transition: all 0.15s;
  font-family: var(--font-body);
}
.demo-chip:hover { border-color: var(--blue2); color: var(--white); }

/* ─── APP SHELL ─── */
#app { display: none; min-height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 var(--gray-200);
}
.topbar-logo { font-family: var(--font-display); font-size: 18px; color: #1C0A00; letter-spacing: -0.3px; }
.topbar-logo span { color: var(--blue2); }
.topbar-divider { width: 1px; height: 22px; background: var(--gray-200); }
.topbar-empresa { font-size: 12px; color: var(--gray-400); }
.topbar-empresa strong { color: var(--gray-600); font-weight: 500; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.topbar-user {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--gray-600);
}
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: #FFF1E6;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #F47920;
}
.topbar-role-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.badge-ajustador { background: #FFF1E6; color: #F47920; }
.badge-supervisor { background: #F5EDE5; color: #C85A00; }
.badge-gerente { background: #F0E8DF; color: #1C0A00; }
.badge-admin { background: #1C0A00; color: #F47920; }
.logout-btn {
  font-size: 12px; color: var(--gray-400); background: none;
  border: 1px solid var(--gray-200); border-radius: 6px;
  padding: 4px 10px; cursor: pointer; font-family: var(--font-body);
}
.logout-btn:hover { color: var(--gray-600); border-color: var(--gray-400); }

/* ─── NAV TABS ─── */
.nav-tabs {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  padding: 0 20px;
  gap: 0;
  overflow-x: auto;
}
.nav-tab {
  padding: 10px 16px;
  font-size: 13px; font-weight: 500;
  color: var(--gray-400);
  border: none; background: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; white-space: nowrap;
  font-family: var(--font-body);
  transition: color 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.nav-tab:hover { color: #F47920; }
.nav-tab.active { color: #F47920; border-bottom-color: #F47920; }
.nav-tab .tab-badge {
  font-size: 10px; font-weight: 600;
  background: var(--red); color: var(--white);
  border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center;
}

/* ─── MAIN CONTENT ─── */
.main { flex: 1; padding: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ─── STAT CARDS ─── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-grid-5 { grid-template-columns: repeat(5, 1fr); }
.stat-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow);
}
.stat-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.stat-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.icon-blue { background: #FFF1E6; }
.icon-teal { background: #E8F5EF; }
.icon-amber { background: #F5EDE5; }
.icon-red { background: var(--red-lt); }
.icon-purple { background: #F0EBF9; }
.stat-delta { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
.delta-up { background: #E8F5EF; color: #1A7A40; }
.delta-down { background: var(--red-lt); color: var(--red); }
.delta-neutral { background: var(--gray-100); color: var(--gray-400); }
.stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: #1C0A00; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--gray-400); }
.stat-sub { font-size: 11px; color: var(--gray-400); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--gray-100); }

/* ─── PANELS ─── */
.panel {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.panel-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--gray-100);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title { font-size: 13px; font-weight: 600; color: #1C0A00; }
.panel-subtitle { font-size: 11px; color: var(--gray-400); }
.panel-body { padding: 16px 18px; }
.panel-action {
  font-size: 12px; color: #F47920; border: none; background: none;
  cursor: pointer; font-family: var(--font-body); font-weight: 500;
}

/* ─── GRID LAYOUTS ─── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
.grid-3-2 { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }

/* ─── TABLES ─── */
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.data-table th {
  text-align: left; padding: 8px 12px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--gray-400);
  border-bottom: 1px solid var(--gray-200);
  background: var(--gray-50);
}
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--gray-50); }
.cell-bold { font-weight: 600; color: #1C0A00; }
.cell-mono { font-family: var(--font-mono); font-size: 11.5px; color: var(--gray-600); }
.cell-blue { color: #F47920; font-weight: 600; }
.cell-teal { color: #1A7A40; font-weight: 600; }

/* ─── PILLS & BADGES ─── */
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.pill-green { background: #E8F5EF; color: #1A7A40; }
.pill-amber { background: var(--amber-lt); color: var(--amber); }
.pill-blue { background: #FFF1E6; color: #F47920; }
.pill-red { background: var(--red-lt); color: var(--red); }
.pill-gray { background: var(--gray-100); color: var(--gray-400); }
.pill-orange { background: #FFF1E6; color: #F47920; }
.pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ─── SEVERITY DOTS ─── */
.sev { display: inline-flex; gap: 2px; }
.sev-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray-200); }
.sev-1 .sev-dot:nth-child(1) { background: #2ECC71; }
.sev-2 .sev-dot:nth-child(-n+2) { background: #F39C12; }
.sev-3 .sev-dot:nth-child(-n+3) { background: #E67E22; }
.sev-4 .sev-dot { background: #C0392B; }

/* ─── MINI PROGRESS ─── */
.mini-bar { height: 4px; border-radius: 2px; background: var(--gray-100); overflow: hidden; }
.mini-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

/* ─── COTIZADOR (AJUSTADOR) ─── */
.cot-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.form-section { margin-bottom: 20px; }
.form-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--gray-400); margin-bottom: 10px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.field label { display: block; font-size: 11.5px; color: var(--gray-600); margin-bottom: 4px; font-weight: 500; }
.field select, .field input {
  width: 100%; padding: 9px 11px;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  font-family: var(--font-body); font-size: 13px;
  color: var(--gray-800); background: var(--white);
  outline: none; transition: border-color 0.15s;
}
.field select:focus, .field input:focus { border-color: #F47920; }
.damage-map { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.dmg-btn {
  border: 1px solid var(--gray-200); border-radius: 8px;
  background: var(--white); padding: 8px 4px;
  cursor: pointer; text-align: center; font-size: 11px;
  color: var(--gray-400); transition: all 0.15s; font-family: var(--font-body);
}
.dmg-btn .dmg-icon { font-size: 18px; display: block; margin-bottom: 3px; }
.dmg-btn:hover { border-color: var(--blue2); color: #F47920; background: #FFF1E6; }
.dmg-btn.on { border-color: #F47920; background: #FFF1E6; color: #F47920; font-weight: 600; }
.sev-select { display: flex; gap: 6px; }
.sev-opt {
  flex: 1; padding: 8px 4px; border: 1px solid var(--gray-200);
  border-radius: 8px; text-align: center; cursor: pointer;
  font-size: 11.5px; font-family: var(--font-body); background: var(--white); color: var(--gray-400);
  transition: all 0.15s;
}
.sev-opt:hover { border-color: var(--blue2); }
.sev-opt.on { font-weight: 600; }
.sev-opt[data-v="1"].on { background:#E8F8EF;border-color:#2ECC71;color:#1A8A4A; }
.sev-opt[data-v="2"].on { background:#FEF9E7;border-color:#F39C12;color:#A67A00; }
.sev-opt[data-v="3"].on { background:#FEF0E6;border-color:#E67E22;color:#A04800; }
.sev-opt[data-v="4"].on { background:#FDECEA;border-color:#C0392B;color:#8A1A10; }
.calc-btn { /* voolkia orange */
  width: 100%; padding: 12px; background: #1C0A00;
  border: none; border-radius: 8px; color: var(--white);
  font-family: var(--font-display); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.02em;
}
.calc-btn:hover { background: #E86A10; }
.calc-btn:active { transform: scale(0.99); }

/* RESULT */
.result-placeholder {
  border: 2px dashed var(--gray-200); border-radius: var(--radius-lg);
  padding: 40px 20px; text-align: center;
  color: var(--gray-400); font-size: 13px;
}
.result-placeholder .rp-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
.result-box { display: none; }
.result-header-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.result-num-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.rnum-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 8px; padding: 12px; text-align: center; }
.rnum-card.highlight { background: #FFF1E6; border-color: #F9A05A; }
.rnum-label { font-size: 10.5px; color: var(--gray-400); margin-bottom: 4px; }
.rnum-val { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #1C0A00; }
.rnum-card.highlight .rnum-val { color: #F47920; font-size: 24px; }
.range-section { margin-bottom: 14px; }
.range-label-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-400); margin-bottom: 4px; }
.range-track { height: 6px; background: var(--gray-100); border-radius: 3px; position: relative; overflow: visible; }
.range-fill { position: absolute; top:0; height: 100%; border-radius: 3px; background: linear-gradient(90deg, #F47920, #1C0A00); }
.range-marker { position: absolute; top: -4px; width: 14px; height: 14px; border-radius: 50%; background: #1C0A00; border: 2px solid var(--white); box-shadow: 0 1px 4px rgba(0,0,0,0.2); transform: translateX(-50%); }
.breakdown-table { width: 100%; font-size: 12.5px; border-collapse: collapse; margin-bottom: 14px; }
.breakdown-table td { padding: 5px 0; }
.breakdown-table td:last-child { text-align: right; font-weight: 600; color: #1C0A00; }
.breakdown-table .total-row td { border-top: 1px solid var(--gray-200); padding-top: 8px; font-weight: 700; font-size: 13.5px; color: #F47920; }
.similares-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.sim-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.sim-label { min-width: 130px; color: var(--gray-600); }
.sim-bar-wrap { flex: 1; }
.sim-pct { font-size: 11px; color: var(--gray-400); min-width: 28px; text-align: right; }
.sim-amount { min-width: 80px; text-align: right; font-weight: 600; font-family: var(--font-mono); color: #F47920; font-size: 12px; }
.confidence-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.conf-label { font-size: 12px; color: var(--gray-400); }
.conf-dots { display: flex; gap: 3px; }
.conf-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-200); }
.conf-dot.on { background: #F47920; }
.conf-pct { font-size: 12px; font-weight: 600; color: #F47920; }
.result-actions { display: flex; gap: 8px; }
.r-btn {
  flex: 1; padding: 9px; border: 1px solid var(--gray-200);
  border-radius: 8px; background: var(--white);
  font-size: 12px; font-family: var(--font-body);
  color: var(--gray-600); cursor: pointer; text-align: center;
  transition: all 0.15s;
}
.r-btn:hover { border-color: var(--blue2); color: #F47920; background: #FFF1E6; }
.r-btn-primary { background: #F47920; color: var(--white); border-color: #F47920; }
.r-btn-primary:hover { background: #E86A10; border-color: #E86A10; color: var(--white); }

/* ─── HISTORIAL PANEL ─── */
.filter-bar { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-bottom: 1px solid var(--gray-100); flex-wrap: wrap; }
.filter-input { flex: 1; min-width: 180px; padding: 7px 11px; border: 1px solid var(--gray-200); border-radius: 8px; font-family: var(--font-body); font-size: 13px; outline: none; }
.filter-input:focus { border-color: #F47920; }
.filter-chip {
  padding: 5px 12px; border: 1px solid var(--gray-200);
  border-radius: 20px; font-size: 12px; cursor: pointer;
  background: var(--white); color: var(--gray-400); font-family: var(--font-body);
  transition: all 0.15s; white-space: nowrap;
}
.filter-chip:hover { border-color: var(--blue2); color: #F47920; }
.filter-chip.on { background: #FFF1E6; border-color: #F47920; color: #F47920; font-weight: 600; }

/* ─── ANALYTICS BARS ─── */
.h-bar-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; margin-bottom: 8px; }
.h-bar-label { min-width: 80px; color: var(--gray-600); }
.h-bar-track { flex: 1; height: 18px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
.h-bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; font-size: 11px; font-weight: 600; color: var(--white); }
.h-bar-val { min-width: 42px; text-align: right; color: var(--gray-600); font-weight: 600; }

/* ─── ALERTS ─── */
.alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 8px; margin-bottom: 8px; font-size: 12.5px; }
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-warn { background: var(--amber-lt); border: 1px solid #F0C040; }
.alert-red { background: var(--red-lt); border: 1px solid #F5A9A4; }

}

function fmt(n) { return '$' + Math.round(n).toLocaleString('es-AR'); }

function calcularCotizacion() {
  const marca = document.getElementById('marca').value;
  const modelo = document.getElementById('modelo').value;
  const anio = parseInt(document.getElementById('anio').value)||2020;
  const zona = document.getElementById('zona').value;
  const cobertura = document.getElementById('cobertura').value;
  const km = document.getElementById('km').value;

  if (!marca) { showToast('⚠️ Seleccioná la marca del vehículo'); return; }
  if (!sevVal) { showToast('⚠️ Seleccioná la severidad del daño'); return; }
  if (dmgSel.size === 0) { showToast('⚠️ Seleccioná al menos una zona de daño'); return; }

  const base = {1:110000,2:270000,3:480000,4:760000}[sevVal];
  const zonaAdj = {CABA:1.12,'GBA Norte':1.08,'GBA Sur':0.97,'GBA Oeste':0.96,Córdoba:0.94,Rosario:0.93,Mendoza:0.91,Interior:0.87}[zona]||1;
  const antAdj = Math.max(0.68, 1-(2024-anio)*0.038);
  const kmAdj = {'0–30.000 km':1.05,'30.000–80.000 km':1.0,'80.000–150.000 km':0.94,'+150.000 km':0.88}[km]||1;
  const repMap = {Frontal:0.30,Trasero:0.22,'Lateral der.':0.16,'Lateral izq.':0.16,Paragolpe:0.10,Techo:0.20,Vidrios:0.13,Mecánico:0.28};
  let repFactor = 0; dmgSel.forEach(d => repFactor += repMap[d]||0.1);
  repFactor = Math.min(repFactor, 0.72);

  const hist = Math.round(base * zonaAdj * antAdj * kmAdj);
  const rep = Math.round(hist * repFactor);
  const mo = Math.round(hist * 0.20);
  const antMonto = Math.round(hist * (1-antAdj) * 0.4);
  const zonaMonto = Math.round(hist * (zonaAdj-1));
  const kmMonto = Math.round(hist * (kmAdj-1));
  const total = hist + rep;
  const rMin = Math.round(total * 0.76);
  const rMax = Math.round(total * 1.28);
  const clusterSize = Math.floor(Math.random()*80)+40;
  const conf = Math.min(93, Math.max(65, 78 + (clusterSize > 80 ? 8 : 0) - (sevVal > 2 ? 5 : 0) - (dmgSel.size > 3 ? 4 : 0)));

  // fill result
  document.getElementById('r-id').textContent = 'SIN-2025-00848';
  document.getElementById('r-vehiculo').textContent = `${marca} ${modelo} — ${anio}`;
  document.getElementById('r-hist').textContent = fmt(hist);
  document.getElementById('r-ref').textContent = fmt(total);
  document.getElementById('r-rep').textContent = fmt(rep);
  document.getElementById('r-min').textContent = fmt(rMin);
  document.getElementById('r-max').textContent = fmt(rMax);
  document.getElementById('r-mo').textContent = fmt(mo);
  document.getElementById('r-rep2').textContent = fmt(rep);
  document.getElementById('r-ant').textContent = (antMonto>0?'-':'+') + fmt(Math.abs(antMonto));
  document.getElementById('r-zona').textContent = (zonaMonto>=0?'+':'-') + fmt(Math.abs(zonaMonto));
  document.getElementById('r-km').textContent = (kmMonto>=0?'+':'-') + fmt(Math.abs(kmMonto));
  document.getElementById('r-total').textContent = fmt(total);
  document.getElementById('r-conf-pct').textContent = conf + '%';
  document.getElementById('r-cluster-size').textContent = `(${clusterSize} casos similares)`;
  document.getElementById('result-ts').textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

  const pill = document.getElementById('r-confianza-pill'); /* voolkia */
  if(conf>=85){pill.className='pill pill-green';pill.textContent='Alta confianza';}
  else if(conf>=72){pill.className='pill pill-amber';pill.textContent='Confianza media';}
  else{pill.className='pill pill-red';pill.textContent='Confianza baja';}

  // range marker
  const pct = 50; // marker al medio del rango
  document.getElementById('r-range-fill').style.left = '15%';
  document.getElementById('r-range-fill').style.width = '70%';
  document.getElementById('r-marker').style.left = '50%';

  // dots
  const dots = document.getElementById('r-dots');
  dots.innerHTML = Array.from({length:5},(_,i)=>`<div class="conf-dot ${i < Math.round(conf/20)?'on':''}"></div>`).join('');

  // similares
  const sims = [
    {v:`${marca} similar (${anio})`, m: Math.round(total*0.93), p:91},
    {v:`Mismo segmento – ${zona}`, m: Math.round(total*1.04), p:82},
    {v:`Sev. similar – región`, m: Math.round(total*0.98), p:78},
    {v:`Cluster más cercano`, m: Math.round(total*1.01), p:75},
  ];
  const maxM = Math.max(...sims.map(s=>s.m));
  document.getElementById('r-similares').innerHTML = sims.map(s=>`
    <div class="sim-row">
      <span class="sim-label">${s.v}</span>
      <div class="sim-bar-wrap"><div class="mini-bar"><div class="mini-fill" style="width:${Math.round(s.m/maxM*100)}%;background:#F47920"></div></div></div>
      <span class="sim-pct">${s.p}%</span>
      <span class="sim-amount">${fmt(s.m)}</span>
    </div>`).join('');

  // alerts
  let alerts = '';
  if(dmgSel.size >= 4) alerts += `<div class="alert alert-warn"><div class="alert-icon">⚠️</div><div><div class="alert-title">Múltiples zonas afectadas</div><div class="alert-body">Con ${dmgSel.size} zonas de daño, considerar peritaje presencial para validar.</div></div></div>`;
  if(sevVal===4) alerts += `<div class="alert alert-red"><div class="alert-icon">🔴</div><div><div class="alert-title">Daño total detectado</div><div class="alert-body">Activar protocolo de baja del vehículo. Verificar póliza y suma asegurada.</div></div></div>`;
  if(conf < 72) alerts += `<div class="alert alert-blue"><div class="alert-icon">ℹ️</div><div><div class="alert-title">Confianza reducida</div><div class="alert-body">Pocos casos similares en la base. Se recomienda revisión por supervisor antes de negociar.</div></div></div>`;
  document.getElementById('r-alerts').innerHTML = alerts;

  document.getElementById('result-empty').style.display='none';
  document.getElementById('result-box').style.display='block';
  showToast('✅ Cálculo completado — ' + fmt(total) + ' de referencia');
}

// ═══ UTILS ═══
function estPill(est) {
  if(est==='cerrado') return '<span class="pill pill-green">Cerrado</span>';
  if(est==='revision') return '<span class="pill pill-amber">En revisión</span>';
  return '<span class="pill pill-blue">Pendiente</span>';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
